spring.application.name=chat_app# Database Connection
//pring.datasource.url=jdbc:mysql://localhost:3306/chat_app?useSSL=false&serverTimezone=UTC
spring.datasource.url=jdbc:mysql://localhost:3306/chat_app?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root

# Replace with your actual MySQL Docker password
spring.datasource.password=mysecretpassword

# Hibernate / JPA settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Thymeleaf cache (set to false so you don't have to restart the server for UI changes)
spring.thymeleaf.cache=false
